<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindSakinah — Sign In 🍓</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="sidebar" id="sidebar">
    <div class="brand">Mind<span>Sakinah</span> 🕊️</div>
    <a href="index.html"><span class="icon">🏠</span> Home</a>
    <a href="login.html" class="active"><span class="icon">🔑</span> Sign In</a>
    <a href="register.html"><span class="icon">📝</span> Register</a>
    <a href="streak.html"><span class="icon">🔥</span> My Streak</a>
</div>

<div class="navbar">
    <button class="menu-btn" id="menu-btn">☰</button>
    <h2>Welcome Back</h2>
    <div class="avatar" id="avatar-initial">🍓</div>
</div>

<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>Mind<span>Sakinah</span></h1>
            <p>Sign in to continue your journey</p>
        </div>
        <div id="alert-box"></div>
        <label class="field-label">Email</label>
        <input type="email" id="email" placeholder="your@email.com">
        <label class="field-label">Password</label>
        <input type="password" id="password" placeholder="Enter your password">
        <button class="btn btn-matcha" id="login-btn">Sign In 🍵</button>
        <div class="auth-footer">
            Don't have an account? <a href="register.html">Create account</a>
        </div>
    </div>
</div>

<script type="module">
    import { api } from './js/api.js';
    
    if (api.getToken()) {
        window.location.href = 'dashboard.html';
    }
    
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    
    document.getElementById('menu-btn').onclick = () => {
        sidebar.classList.add('open');
        overlay.classList.add('show');
    };
    
    overlay.onclick = () => {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
    };
    
    document.getElementById('login-btn').onclick = async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const alertBox = document.getElementById('alert-box');
        
        alertBox.innerHTML = '';
        
        if (!email || !password) {
            alertBox.innerHTML = '<div class="alert alert-error">Please fill in all fields 🍓</div>';
            return;
        }
        
        const btn = document.getElementById('login-btn');
        btn.textContent = 'Signing in...';
        btn.disabled = true;
        
        try {
            const result = await api.login(email, password);
            if (result.user) {
                localStorage.setItem('user', JSON.stringify(result.user));
                window.location.href = 'dashboard.html';
            }
        } catch (err) {
            alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
            btn.textContent = 'Sign In 🍵';
            btn.disabled = false;
        }
    };
    
    document.getElementById('password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
</script>
</body>
</html>
