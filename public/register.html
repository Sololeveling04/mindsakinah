<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodJar — Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrap">
    <div class="card auth-card">
        <div class="auth-logo">
            <h1>Mood<span>Jar</span> 🫙</h1>
            <p>Create your account</p>
        </div>
        <div id="alert-box"></div>
        <label class="field-label">Username</label>
        <input type="text" id="username" placeholder="Choose a username">
        <label class="field-label">Email</label>
        <input type="email" id="email" placeholder="your@email.com">
        <label class="field-label">Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters">
        <label class="field-label">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat password">
        <button class="btn btn-green" id="reg-btn">CREATE ACCOUNT</button>
        <div class="auth-footer">
            Already have an account? <a href="index.html">Login here</a>
        </div>
    </div>
</div>
<script type="module">
    import { api } from './js/api.js';
    
    if (api.getToken()) {
        window.location.href = 'dashboard.html';
    }
    
    document.getElementById('reg-btn').onclick = async () => {
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        const alertBox = document.getElementById('alert-box');
        
        alertBox.innerHTML = '';
        
        if (!username || !email || !password || !confirm) {
            alertBox.innerHTML = '<div class="alert alert-error">Please fill in all fields.</div>';
            return;
        }
        
        if (password !== confirm) {
            alertBox.innerHTML = '<div class="alert alert-error">Passwords do not match.</div>';
            return;
        }
        
        if (password.length < 6) {
            alertBox.innerHTML = '<div class="alert alert-error">Password must be at least 6 characters.</div>';
            return;
        }
        
        const btn = document.getElementById('reg-btn');
        btn.textContent = 'Creating account...';
        btn.disabled = true;
        
        try {
            const result = await api.register(username, email, password);
            if (result.user) {
                localStorage.setItem('user', JSON.stringify(result.user));
                window.location.href = 'dashboard.html';
            }
        } catch (err) {
            alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
            btn.textContent = 'CREATE ACCOUNT';
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
