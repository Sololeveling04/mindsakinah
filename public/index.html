<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodJar — Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrap">
    <div class="card auth-card">
        <div class="auth-logo">
            <h1>Mood<span>Jar</span> 🫙</h1>
            <p>Your daily mood tracker with Quranic guidance</p>
        </div>
        <div id="alert-box"></div>
        <label class="field-label">Email</label>
        <input type="email" id="email" placeholder="your@email.com">
        <label class="field-label">Password</label>
        <input type="password" id="password" placeholder="Enter your password">
        <button class="btn btn-green" id="login-btn">LOGIN</button>
        <div class="auth-footer">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>
</div>
<script type="module">
    import { api } from './js/api.js';
    
    // If already logged in, go to dashboard
    if (api.getToken()) {
        window.location.href = 'dashboard.html';
    }
    
    document.getElementById('login-btn').onclick = async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const alertBox = document.getElementById('alert-box');
        
        alertBox.innerHTML = '';
        
        if (!email || !password) {
            alertBox.innerHTML = '<div class="alert alert-error">Please fill in all fields.</div>';
            return;
        }
        
        const btn = document.getElementById('login-btn');
        btn.textContent = 'Logging in...';
        btn.disabled = true;
        
        try {
            const result = await api.login(email, password);
            if (result.user) {
                localStorage.setItem('user', JSON.stringify(result.user));
                window.location.href = 'dashboard.html';
            }
        } catch (err) {
            alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
            btn.textContent = 'LOGIN';
            btn.disabled = false;
        }
    };
    
    document.getElementById('password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
</script>
</body>
</html>
